apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader
rules:
  - apiGroups:
      - 'tempo.grafana.com'
    resources:
      - prime
    resourceNames:
      - traces
    verbs:
      - 'get'
      - 'list'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempo-prime-tenant-write
rules:
  - apiGroups:
      - 'tempo.grafana.com'
    resources:
      - prime   # Must exactly match your tenant name
    resourceNames:
      - traces
    verbs:
      - 'create'