apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: opencode-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    template:
      annotations:
        che.eclipse.org/mount-as: file
        che.eclipse.org/mount-path: /home/user/.config/opencode
      labels:
        app.kubernetes.io/part-of: che.eclipse.org
        app.kubernetes.io/component: devspaces-secret
      type: Opaque
      data:
        opencode.jsonc: |
          "{{ .opencodeConfig | toString }}"
    creationPolicy: Owner
  data:
    - secretKey: opencodeConfig
      remoteRef:
        key: OPENCODE_CONFIG
