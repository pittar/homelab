apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: opencode-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    template:
      engineVersion: v2
      metadata:
        labels:
          che.eclipse.org/workspace-secret: 'true'
          che.eclipse.org/automount-workspace-secret: 'true'
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspace-config
        annotations:
          che.eclipse.org/mount-path: /data/opencode
          che.eclipse.org/mount-as: file
      type: Opaque
      data:
        opencode.jsonc: |
          "{{ .opencodeConfig | toString }}"
    creationPolicy: Owner
  data:
    - secretKey: opencodeConfig
      remoteRef:
        key: OPENCODE_JSONC
