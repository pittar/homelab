apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: kuadrant-gateway-telemetry
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kuadrant-gateway
  tracing:
    - providers:
        - name: otel-tracing
      randomSamplingPercentage: 100.0