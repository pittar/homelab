#     mode tcp
#     balance roundrobin
#     server prod_apps_ssl_server 192.168.2.150:443 check inter 5s fall 3 rise 2

# Prime RHCL api
backend prime_rhcl_api_ssl
        mode tcp
        balance roundrobin
        server prime_rhcl_api_ssl_server 192.168.2.100:443 check inter 5s fall 3 rise 2

frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

