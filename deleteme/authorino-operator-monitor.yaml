apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    control-plane: controller-manager
    kuadrant.io/observability: "true"
  name: authorino-operator-monitor
  namespace: kuadrant-system
spec:
  endpoints:
  - path: /metrics
    port: metrics
    scheme: http
  namespaceSelector: {}
  selector:
    matchLabels:
      control-plane: authorino-operator
